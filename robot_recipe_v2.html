<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 로봇 소스 레시피!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: 'Gaegu', cursive, sans-serif;
            background: radial-gradient(circle at 30% 20%, #ffeef8 0%, #e0f2fe 60%, #f0fdf4 100%);
            touch-action: manipulation;
            user-select: none;
            overflow-x: hidden;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* ── 버튼 공통 ── */
        .bubble-btn {
            transition: transform 0.15s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.15s;
            cursor: pointer;
            -webkit-user-select: none;
        }
        .bubble-btn:active { transform: scale(0.93) !important; }

        .shadow-cute         { box-shadow: 0 6px 0 #cbd5e1; }
        .shadow-cute-primary { box-shadow: 0 6px 0 #0369a1; }
        .shadow-cute-accent  { box-shadow: 0 6px 0 #be185d; }
        .shadow-cute-success { box-shadow: 0 6px 0 #15803d; }
        .shadow-cute-orange  { box-shadow: 0 6px 0 #c2410c; }

        /* ── 로봇 애니메이션 ── */
        @keyframes float {
            0%,100% { transform: translateY(0px) rotate(0deg); }
            50%      { transform: translateY(-12px) rotate(1.5deg); }
        }
        @keyframes bounce-in {
            0%   { transform: scale(0) rotate(-10deg); opacity:0; }
            60%  { transform: scale(1.15) rotate(3deg); opacity:1; }
            80%  { transform: scale(0.95) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes wiggle {
            0%,100% { transform: rotate(0deg); }
            20%  { transform: rotate(-8deg); }
            40%  { transform: rotate(8deg); }
            60%  { transform: rotate(-5deg); }
            80%  { transform: rotate(5deg); }
        }
        @keyframes flicker {
            0%,100% { opacity:0.8; transform:scaleY(1); }
            50%     { opacity:1;   transform:scaleY(1.4); }
        }
        @keyframes skill-pop {
            0%   { transform: scale(0) rotate(-15deg); opacity:0; }
            50%  { transform: scale(1.3) rotate(5deg);  opacity:1; }
            100% { transform: scale(1)  rotate(0deg);   opacity:1; }
        }
        @keyframes sparkle-spin {
            0%   { transform: rotate(0deg) scale(1); }
            50%  { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        @keyframes slide-up {
            from { transform: translateY(30px); opacity:0; }
            to   { transform: translateY(0);    opacity:1; }
        }
        @keyframes pulse-glow {
            0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.6); }
            50%     { box-shadow: 0 0 0 12px rgba(251,191,36,0); }
        }
        @keyframes confetti-fall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
            100% { transform: translateY(120px) rotate(720deg); opacity:0; }
        }
        @keyframes name-reveal {
            0%   { letter-spacing: -4px; opacity:0; transform: scaleX(0.7); }
            100% { letter-spacing: normal; opacity:1; transform: scaleX(1); }
        }

        .floating-robot  { animation: float 3s ease-in-out infinite; }
        .bounce-in       { animation: bounce-in 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .wiggle          { animation: wiggle 0.5s ease-in-out; }
        .fire-flicker    { animation: flicker 0.15s ease-in-out infinite; transform-origin: top; }
        .slide-up        { animation: slide-up 0.4s ease forwards; }
        .pulse-glow      { animation: pulse-glow 1.5s ease infinite; }
        .name-reveal     { animation: name-reveal 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }

        /* ── 진행 바 ── */
        .step-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: background 0.3s, transform 0.3s;
            display: inline-block;
        }
        .step-dot.active  { background: #0ea5e9; transform: scale(1.4); }
        .step-dot.done    { background: #34d399; }

        /* ── 색상 선택 팔레트 ── */
        .color-swatch {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 4px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .color-swatch.selected { border-color: #1e293b; transform: scale(1.25); }
        @media (max-width: 380px) { .color-swatch { width: 30px; height: 30px; } }

        /* ── 선택 카드 ── */
        .choice-card {
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .choice-card:active { transform: scale(0.95); }

        /* ── 스킬 토스트 ── */
        #skill-toast {
            animation: skill-pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
        }

        /* ── 컨페티 ── */
        .confetti-piece {
            position: fixed;
            width: 12px; height: 12px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 9999;
            animation: confetti-fall 1.2s ease-in forwards;
        }

        /* ── 스크롤바 ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 9px; }

        /* ── 완성 카드 ── */
        .recipe-card {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        /* ── 모바일 최적화 ── */
        @media (max-width: 640px) {
            #app-container { border-radius: 28px !important; border-width: 5px !important; }
            .text-2xl  { font-size: 1.25rem !important; }
            .text-3xl  { font-size: 1.5rem !important; }
        }
    </style>
</head>

// ═══════════════════════════════
//  오디오
// ═══════════════════════════════
function playSound(type) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'click') {
            osc.frequency.setValueAtTime(300, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime+0.1);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime+0.1);
        } else if (type === 'laser') {
            osc.type='sawtooth';
            osc.frequency.setValueAtTime(900, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime+0.4);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime+0.4);
        } else if (type === 'punch') {
            osc.type='triangle';
            osc.frequency.setValueAtTime(180, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime+0.3);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime+0.3);
        } else if (type === 'booster') {
            osc.type='sawtooth';
            osc.frequency.setValueAtTime(80, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(500, ctx.currentTime+0.5);
            gain.gain.setValueAtTime(0.25, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime+0.5);
        } else if (type === 'success') {
            const now = ctx.currentTime;
            [523.25,659.25,783.99,1046.50].forEach((freq,i) => {
                const o=ctx.createOscillator(), g=ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.setValueAtTime(freq, now+i*0.08);
                g.gain.setValueAtTime(0.12, now+i*0.08);
                o.start(now+i*0.08); o.stop(now+i*0.08+0.3);
            });
        } else if (type === 'pop') {
            osc.type='sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime+0.15);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime+0.15);
        }
    } catch(e) {}
}

function launchConfetti(n=18) {
    const colors = ['#f87171','#fbbf24','#34d399','#60a5fa','#c084fc','#fb923c'];
    const container = document.getElementById('confetti-container');
    for(let i=0;i<n;i++) {
        setTimeout(()=>{
            const el = document.createElement('div');
            el.className = 'confetti-piece';
            el.style.cssText = `left:${10+Math.random()*80}%;top:${-5+Math.random()*10}%;background:${colors[i%colors.length]};transform:rotate(${Math.random()*360}deg);animation-delay:${Math.random()*0.4}s;animation-duration:${0.9+Math.random()*0.6}s;border-radius:${Math.random()>0.5?'50%':'3px'}`;
            container.appendChild(el);
            setTimeout(()=>el.remove(), 1800);
        }, i*40);
    }
}

// ═══════════════════════════════
//  진행 바
// ═══════════════════════════════
function updateProgressBar() {
    const total=6, cur=gameState.step;
    if(cur===0){ document.getElementById('progress-bar').classList.add('hidden'); return; }
    document.getElementById('progress-bar').classList.remove('hidden');
    for(let i=1;i<=total;i++){
        const dot=document.getElementById(`dot-${i}`);
        if(!dot) continue;
        dot.className='step-dot' + (i<cur?' done':i===cur?' active':'');
    }
    ['12','23','34','45','56'].forEach((pair,idx)=>{
        const line=document.getElementById(`line-${pair}`);
        if(line) line.style.background = idx+1<cur?'#34d399':'#e2e8f0';
    });
}

// ═══════════════════════════════
//  색상 팔레트 렌더러
// ═══════════════════════════════
function renderColorPicker(part, stateKey) {
    const palette = COLOR_PALETTES[part];
    let swatches = '';
    palette.forEach((c,i) => {
        const sel = (gameState[stateKey].fill===c.fill) ? 'selected':'';
        swatches += `<div class="color-swatch ${sel}" style="background:${c.fill};border-color:${sel?'#1e293b':'transparent'}" data-part="${stateKey}" data-idx="${i}" title="${c.label}"></div>`;
    });
    return `<div class="flex flex-wrap gap-2 items-center">${swatches}</div>`;
}
function attachColorEvents() {
    document.querySelectorAll('.color-swatch').forEach(el => {
        const handler = (e) => {
            e.preventDefault(); e.stopPropagation();
            const key = el.dataset.part;
            const idx = parseInt(el.dataset.idx);
            const part = key==='headColor'?'head': key==='bodyColor'?'body':'arms';
            gameState[key] = COLOR_PALETTES[part][idx];
            playSound('pop');
            // 같은 part의 swatches 업데이트
            document.querySelectorAll(`.color-swatch[data-part="${key}"]`).forEach(s=>{
                s.classList.toggle('selected', parseInt(s.dataset.idx)===idx);
                s.style.borderColor = parseInt(s.dataset.idx)===idx?'#1e293b':'transparent';
            });
            updateRobotGraphics();
        };
        el.addEventListener('touchend', handler, {passive:false});
        el.addEventListener('click',    handler);
    });
}

function renderNavButtons(nextLabel='다음 단계! ➡️') {

    navBox.classList.remove('hidden');

        <button id="prev-btn" class="px-5 py-4 bg-slate-200 hover:bg-slate-300 text-slate-700 text-xl font-bold rounded-2xl bubble-btn shadow-cute">⬅️ 뒤로</button>
        <button id="next-btn" class="flex-grow py-4 bg-sky-500 hover:bg-sky-600 text-white text-xl font-bold rounded-2xl bubble-btn shadow-cute-primary">${nextLabel}</button>`;
    document.getElementById('prev-btn').addEventListener('click', ()=>{playSound('click');gameState.step--;renderScene();});

}

//  아이템 선택
// ═══════════════════════════════
function selectItem(field, value) {
    playSound('click');
    gameState[field]=value;
    if(field==='skill') playSound(SKILLS[value].sound);
    // 카드 선택 애니
    document.querySelectorAll('.choice-card').forEach(c=>{
        if(c.dataset.val===value && c.dataset.field===field){
            c.classList.add('wiggle');
            setTimeout(()=>c.classList.remove('wiggle'),500);
        }
    });
    renderScene();
}

function triggerSkill() {
    const sk=SKILLS[gameState.skill];
    playSound(sk.sound);
    updateRobotGraphics(true);
    const toast=document.getElementById('skill-toast');
    toast.textContent=`${sk.name} 발동!! 💥`;
    toast.classList.remove('hidden');
    launchConfetti(12);
    setTimeout(()=>{ toast.classList.add('hidden'); updateRobotGraphics(false); },1800);
}

// ═══════════════════════════════
//  저장
// ═══════════════════════════════
function saveRobotRecipe() {
    playSound('success');
    launchConfetti(25);

    // SVG → Canvas → PNG 저장 (html2canvas 대신 네이티브 방식)
    const svgEl = document.querySelector('#robot-view-box svg');
    if (!svgEl) { alert('로봇을 먼저 만들어줘! 🤖'); return; }

    const robotName = gameState.robotName || gameState.userName || '꼬마박사';
    const skillName = SKILLS[gameState.skill].name;
    const headName  = HEADS[gameState.head].name;
    const bodyName  = BODIES[gameState.body].name;

    // SVG 직렬화
    const svgClone = svgEl.cloneNode(true);
    svgClone.setAttribute('xmlns','http://www.w3.org/2000/svg');
    const svgStr  = new XMLSerializer().serializeToString(svgClone);
    const svgBlob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
    const svgUrl  = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
        // 카드 크기 캔버스
        const W=480, H=620;
        const canvas = document.createElement('canvas');
        canvas.width=W; canvas.height=H;
        const ctx = canvas.getContext('2d');

        // 배경 그라디언트
        const grad = ctx.createRadialGradient(W*0.3,H*0.2,0, W*0.5,H*0.5,W*0.8);
        grad.addColorStop(0,'#ffeef8');
        grad.addColorStop(0.6,'#e0f2fe');
        grad.addColorStop(1,'#f0fdf4');
        ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

        // 테두리 카드
        ctx.fillStyle='rgba(255,255,255,0.88)';
        ctx.beginPath();
        ctx.roundRect(16,16,W-32,H-32,28);
        ctx.fill();
        ctx.strokeStyle='#7dd3fc'; ctx.lineWidth=6;
        ctx.stroke();

        // 타이틀
        ctx.font='bold 26px Gaegu, sans-serif';
        ctx.fillStyle='#0284c7';
        ctx.textAlign='center';
        ctx.fillText('🤖 나만의 로봇 소스 레시피!', W/2, 62);

        // 로봇 이미지
        ctx.drawImage(img, W/2-100, 80, 200, 270);

        // 로봇 이름 뱃지
        if(gameState.robotName){
            ctx.font='bold 22px Gaegu, sans-serif';
            const bw=ctx.measureText(`🤖 ${gameState.robotName}`).width+32;
            const bx=(W-bw)/2, by=362;
            const bGrad=ctx.createLinearGradient(bx,by,bx+bw,by);
            bGrad.addColorStop(0,'#a855f7'); bGrad.addColorStop(1,'#ec4899');
            ctx.fillStyle=bGrad;
            ctx.beginPath(); ctx.roundRect(bx,by,bw,36,18); ctx.fill();
            ctx.fillStyle='white';
            ctx.fillText(`🤖 ${gameState.robotName}`, W/2, by+25);
        }

        // 레시피 카드
        ctx.fillStyle='#fefce8';
        ctx.beginPath(); ctx.roundRect(36,410,W-72,168,18); ctx.fill();
        ctx.strokeStyle='#fde68a'; ctx.lineWidth=3; ctx.stroke();

        ctx.textAlign='left';
        ctx.fillStyle='#92400e';
        ctx.font='bold 20px Gaegu, sans-serif';
        ctx.fillText(`📜 ${gameState.userName} 박사님의 비법서`, 56, 440);

        ctx.font='18px Gaegu, sans-serif';
        ctx.fillStyle='#78350f';
        const lines=[
            `🔵 머리: ${headName}`,
            `🟠 몸통: ${bodyName}`,
            `💥 주특기: ${skillName}`,
        ];
        lines.forEach((l,i)=>ctx.fillText(l, 56, 472+i*30));

        URL.revokeObjectURL(svgUrl);
        const link=document.createElement('a');
        link.download=`${robotName}-로봇-레시피.png`;
        link.href=canvas.toDataURL('image/png');
        link.click();
    };
    img.onerror = () => { alert('저장 중 오류가 생겼어요. 다시 해볼까요? 🥲'); URL.revokeObjectURL(svgUrl); };
    img.src = svgUrl;
}

        const input=document.getElementById('name-input');

    }

    // ── STEP 1: 머리 ──
    else if(gameState.step===1){

                    마지막 소스! 🏷️<br>로봇에게 <span class="text-purple-500">이름</span>을 붙여줘!
                </h2>
                <p class="text-lg text-slate-500">어떤 이름이 어울릴까? (안 써도 괜찮아!)</p>
                <input type="text" id="robot-name-input" value="${gameState.robotName}"
                    placeholder="예: 번개맨, 슈퍼봇, 별이..."
                    class="w-full text-center text-2xl px-6 py-4 rounded-2xl border-4 border-purple-300 focus:outline-none focus:border-purple-500 shadow-inner font-bold"/>
                <div class="bg-purple-50 border-3 border-purple-200 rounded-2xl p-4 text-lg text-purple-700 font-bold">
                    💡 이름 아이디어: 번개봇, 별빛이, 무적맨, 달달이, 슈퍼봇, 꿈돌이
                </div>
            </div>`;
        const rInput=document.getElementById('robot-name-input');
        rInput.addEventListener('input',()=>{ gameState.robotName=rInput.value; updateRobotGraphics(); });
        // 다음 버튼 재정의 (이름 없어도 통과)
        document.getElementById('next-btn').addEventListener('click',()=>{},true);
    }

    // ── STEP 6: 완성! ──
    else if(gameState.step===6){
        launchConfetti(30);
        playSound('success');

        const navBox2=document.getElementById('navigation-box');
        navBox2.classList.remove('hidden');
        navBox2.innerHTML=`
            <button id="save-btn" class="w-1/2 py-4 bg-green-600 hover:bg-green-700 text-white text-xl font-bold rounded-2xl bubble-btn shadow-cute-success flex items-center justify-center gap-2">📷 저장하기</button>
            <button id="reset-btn" class="w-1/2 py-4 bg-sky-500 hover:bg-sky-600 text-white text-xl font-bold rounded-2xl bubble-btn shadow-cute-primary">🔄 다시 만들기</button>`;
        document.getElementById('save-btn').addEventListener('click', saveRobotRecipe);
        document.getElementById('reset-btn').addEventListener('click', resetGame);

        const robotDisplayName = gameState.robotName ? `"${gameState.robotName}"` : '내 로봇';
        container.innerHTML=`
            <div class="space-y-4 slide-up">
                <div class="recipe-card border-4 border-yellow-300 rounded-[28px] p-5 shadow-cute relative">
                    <h2 class="text-2xl font-bold text-amber-800 border-b-2 border-dashed border-amber-300 pb-2 mb-3">
                        📜 ${gameState.userName} 박사님의 비법서
                    </h2>
                    <ul class="space-y-2 text-xl text-amber-900">
                        <li>🤖 <strong>로봇 이름:</strong> <span class="text-purple-600 font-extrabold">${gameState.robotName || '(이름 없음)'}</span></li>
                        <li>🔵 <strong>머리 소스:</strong> ${HEADS[gameState.head].name}</li>
                        <li>🟠 <strong>몸통 소스:</strong> ${BODIES[gameState.body].name}</li>
                        <li>👀 <strong>이목구비:</strong> ${gameState.eye} · ${gameState.nose} · ${gameState.mouth}</li>
                        <li>💥 <strong>주특기:</strong> <span class="text-rose-600 font-extrabold">${SKILLS[gameState.skill].name}</span></li>
                    </ul>
                </div>
                <button id="skill-btn" class="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white text-2xl font-extrabold rounded-2xl bubble-btn shadow-cute-accent flex items-center justify-center gap-3 animate-bounce">
                    💥 스페셜 스킬 발동!!
                </button>
            </div>`;
        document.getElementById('skill-btn').addEventListener('click', triggerSkill);
    }
}

// ═══════════════════════════════
//  사운드 버튼
// ═══════════════════════════════
document.getElementById('sound-btn').addEventListener('click',()=>playSound('success'));

// ── 초기 실행 ──
renderScene();
</script>
</body>
</html>
